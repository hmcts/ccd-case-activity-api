import java.nio.file.Files
import java.nio.file.LinkOption
import java.nio.file.StandardCopyOption

plugins {
    id 'application'
    id 'com.github.spacialcircumstances.gradle-cucumber-reporting' version '0.1.25'
}

def projectRootPath = rootProject.projectDir.toPath().toRealPath()

def projectPath = { String relativePath ->
    def resolvedPath = projectRootPath.resolve(relativePath).normalize()
    if (!resolvedPath.startsWith(projectRootPath)) {
        throw new GradleException("Report path must stay inside the project directory: ${relativePath}")
    }
    resolvedPath
}

def failIfSymbolicLink = { path ->
    if (Files.exists(path, LinkOption.NOFOLLOW_LINKS) && Files.isSymbolicLink(path)) {
        throw new GradleException("Refusing to write report through symbolic link: ${path}")
    }
}

def cucumberJsonReport = projectPath('target/cucumber.json').toFile()
def cucumberHtmlReport = projectPath('target/cucumber/cucumber-html-reports')

def replaceCucumberReportDirectory = { String reportDirectory ->
    def destination = projectPath(reportDirectory)
    if (!Files.exists(cucumberHtmlReport, LinkOption.NOFOLLOW_LINKS)) {
        return
    }

    failIfSymbolicLink(cucumberHtmlReport)
    failIfSymbolicLink(destination)

    delete(destination.toFile())
    Files.createDirectories(destination.parent)
    Files.move(cucumberHtmlReport, destination, StandardCopyOption.REPLACE_EXISTING)
}

java {
  toolchain {
    languageVersion = JavaLanguageVersion.of(21)
  }
}

// tag::repositories[]
repositories {
    mavenLocal()
    mavenCentral()
    maven {
        name = "AzureArtifacts"
        url = uri("https://pkgs.dev.azure.com/hmcts/Artifacts/_packaging/hmcts-lib/maven/v1")
    }
}
// end::repositories[]

// tag::dependencies[]
dependencies {
    testImplementation group: 'com.github.hmcts', name: 'ccd-test-definitions', version: '7.25.4'
    testImplementation group: 'com.github.hmcts', name: 'befta-fw', version: '9.2.6_CCD-7522'
    testImplementation 'com.github.hmcts:fortify-client:1.4.10:all'
}
// end::dependencies[]

sourceSets {
    aat {
        java {
            srcDir('src/java')
            compileClasspath += main.output + test.output
            runtimeClasspath += main.output + test.output
        }
        resources {
            srcDir('src/resources')
        }
    }
}

configurations {
    aatImplementation.extendsFrom(testImplementation)
    cucumberRuntime.extendsFrom(functionalRuntime)
}

tasks.register('fortifyScan', JavaExec)  {
    mainClass = "uk.gov.hmcts.fortifyclient.FortifyClientMainApp"
    classpath += sourceSets.test.runtimeClasspath
    jvmArgs = ['--add-opens=java.base/java.lang.reflect=ALL-UNNAMED']
    // The line below prevents the build from failing
    // if the Fortify scan detects issues
   // ignoreExitValue = true     **No longer required as fortify scan is enabled now
}

tasks.register('highLevelDataSetup', JavaExec) {
    mainClass = "uk.gov.hmcts.ccd.caseactivity.befta.HighLevelDataSetupApp"
    classpath += configurations.cucumberRuntime + sourceSets.aat.runtimeClasspath
    jvmArgs = ['--add-opens=java.base/java.lang.reflect=ALL-UNNAMED']
}


tasks.register('smoke', Test) {
  description = 'Executes smoke tests against an the CCD Case Activity API instance just deployed'
  setTestClassesDirs(sourceSets.aat.output.classesDirs)

  doFirst {
    generateCucumberReports.enabled = true
    javaexec {
      main = "uk.gov.hmcts.ccd.caseactivity.befta.CaseActivityBeftaMain"
      classpath += configurations.cucumberRuntime + sourceSets.aat.runtimeClasspath + sourceSets.main.output + sourceSets.test.output
      jvmArgs = ['--add-opens=java.base/java.lang.reflect=ALL-UNNAMED']
      args = ['--plugin', "json:${cucumberJsonReport}", '--tags', '@Smoke', '--glue',
              'uk.gov.hmcts.befta.player', 'src/resources/features']
    }
  }

  finalizedBy {
    generateCucumberReports {
      doLast{
            replaceCucumberReportDirectory('BEFTA Report for Smoke Tests')
      }
    }
  }

  outputs.upToDateWhen { false }
}

tasks.register('functional', Test) {
  description = 'Executes functional tests against an the CCD Case Activity API instance just deployed'
  setTestClassesDirs(sourceSets.aat.output.classesDirs)

  doFirst {
    generateCucumberReports.enabled = true
    javaexec {
      main = "uk.gov.hmcts.ccd.caseactivity.befta.CaseActivityBeftaMain"
      classpath += configurations.cucumberRuntime + sourceSets.aat.runtimeClasspath + sourceSets.main.output + sourceSets.test.output
      jvmArgs = ['--add-opens=java.base/java.lang.reflect=ALL-UNNAMED']
      args = ['--plugin', "json:${cucumberJsonReport}", '--tags', 'not @Ignore', '--glue',
              'uk.gov.hmcts.befta.player', 'src/resources/features']
    }
  }

  finalizedBy {
    generateCucumberReports {
      doLast{
        replaceCucumberReportDirectory('BEFTA Report for Functional Tests')
      }
    }
  }

  outputs.upToDateWhen { false }
}

cucumberReports {
    outputDir = projectPath('target/cucumber').toFile()
    reports = files(cucumberJsonReport)
}
